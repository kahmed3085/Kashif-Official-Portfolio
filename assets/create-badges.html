<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Certification Badge Creator</title>
    <style>
        body { background: #0a0a0a; color: #f5f5f5; font-family: Inter, sans-serif; padding: 40px; }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { margin-bottom: 30px; }
        .badges { display: grid; grid-template-columns: repeat(2, 1fr); gap: 40px; }
        .badge { text-align: center; }
        .badge svg { max-width: 200px; height: auto; margin-bottom: 20px; }
        .badge p { font-size: 12px; color: #888; }
        button {
            padding: 12px 24px;
            background: #89AACC;
            color: #0a0a0a;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Your Certification Badges</h1>
    <p style="margin-bottom: 30px; color: #888;">
        Right-click each badge below and select "Save image as..." to save them as individual PNG files in your assets folder.
    </p>

    <div class="badges">
        <!-- Badge 1: ITWorks -->
        <div class="badge">
            <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#89AACC;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#4E85BF;stop-opacity:1" />
                    </linearGradient>
                </defs>
                <circle cx="100" cy="100" r="98" fill="none" stroke="url(#grad1)" stroke-width="3"/>
                <circle cx="100" cy="100" r="85" fill="#0a0a0a"/>
                <text x="100" y="85" font-family="Bricolage Grotesque, sans-serif" font-size="28" font-weight="bold" fill="#89AACC" text-anchor="middle" dominant-baseline="middle">IW</text>
                <text x="100" y="120" font-family="Inter, sans-serif" font-size="12" fill="#f5f5f5" text-anchor="middle">AI-FIRST</text>
                <text x="100" y="135" font-family="Inter, sans-serif" font-size="11" fill="#888" text-anchor="middle">OPERATIONS</text>
            </svg>
            <p>ITWorks Certification</p>
            <button onclick="downloadBadge('itworks-badge')">Save as PNG</button>
        </div>

        <!-- Badge 2: Microsoft Zones -->
        <div class="badge">
            <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#F7931E;stop-opacity:1" />
                    </linearGradient>
                </defs>
                <circle cx="100" cy="100" r="98" fill="none" stroke="url(#grad2)" stroke-width="3"/>
                <circle cx="100" cy="100" r="85" fill="#0a0a0a"/>
                <text x="100" y="80" font-family="Inter, sans-serif" font-size="12" fill="#F7931E" text-anchor="middle" font-weight="600">MICROSOFT</text>
                <text x="100" y="110" font-family="Bricolage Grotesque, sans-serif" font-size="20" font-weight="bold" fill="#F7931E" text-anchor="middle">ZONES</text>
                <text x="100" y="135" font-family="Inter, sans-serif" font-size="10" fill="#888" text-anchor="middle">STRATEGIC ACCOUNTS</text>
            </svg>
            <p>Microsoft Strategic Accounts</p>
            <button onclick="downloadBadge('microsoft-zones-badge')">Save as PNG</button>
        </div>

        <!-- Badge 3: Azure Fundamentals -->
        <div class="badge">
            <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#0078D4;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#50E6FF;stop-opacity:1" />
                    </linearGradient>
                </defs>
                <circle cx="100" cy="100" r="98" fill="none" stroke="url(#grad3)" stroke-width="3"/>
                <circle cx="100" cy="100" r="85" fill="#0a0a0a"/>
                <text x="100" y="75" font-family="Inter, sans-serif" font-size="11" fill="#0078D4" text-anchor="middle" font-weight="600">CERTIFIED</text>
                <text x="100" y="100" font-family="Bricolage Grotesque, sans-serif" font-size="18" font-weight="bold" fill="#0078D4" text-anchor="middle">AZURE</text>
                <text x="100" y="120" font-family="Inter, sans-serif" font-size="14" fill="#50E6FF" text-anchor="middle" font-weight="600">FUNDAMENTALS</text>
                <text x="100" y="140" font-family="Inter, sans-serif" font-size="10" fill="#888" text-anchor="middle">AZ-900</text>
            </svg>
            <p>Azure Fundamentals</p>
            <button onclick="downloadBadge('azure-cert-badge')">Save as PNG</button>
        </div>

        <!-- Badge 4: Copilot M365 Technical Champ -->
        <div class="badge">
            <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#1B7A3B;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#27AE60;stop-opacity:1" />
                    </linearGradient>
                </defs>
                <circle cx="100" cy="100" r="98" fill="none" stroke="url(#grad4)" stroke-width="3"/>
                <circle cx="100" cy="100" r="85" fill="#0a0a0a"/>
                <text x="100" y="80" font-family="Inter, sans-serif" font-size="11" fill="#27AE60" text-anchor="middle" font-weight="600">COPILOT FOR</text>
                <text x="100" y="105" font-family="Bricolage Grotesque, sans-serif" font-size="18" font-weight="bold" fill="#27AE60" text-anchor="middle">M365</text>
                <text x="100" y="130" font-family="Inter, sans-serif" font-size="11" fill="#888" text-anchor="middle">TECHNICAL CHAMP 2024</text>
            </svg>
            <p>Copilot M365 Technical Champ</p>
            <button onclick="downloadBadge('m365-champ-badge')">Save as PNG</button>
        </div>
    </div>
</div>

<script>
function downloadBadge(badgeId) {
    // Map badge IDs to SVG strings
    const badges = {
        'itworks-badge': document.querySelectorAll('svg')[0],
        'microsoft-zones-badge': document.querySelectorAll('svg')[1],
        'azure-cert-badge': document.querySelectorAll('svg')[2],
        'm365-champ-badge': document.querySelectorAll('svg')[3]
    };

    const svg = badges[badgeId];
    if (!svg) return;

    // Convert SVG to canvas
    const canvas = document.createElement('canvas');
    canvas.width = 200;
    canvas.height = 200;
    const ctx = canvas.getContext('2d');

    // Draw background
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, 200, 200);

    // Create image from SVG
    const svgString = new XMLSerializer().serializeToString(svg);
    const blob = new Blob([svgString], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);
    const img = new Image();

    img.onload = () => {
        ctx.drawImage(img, 0, 0);
        const pngUrl = canvas.toDataURL('image/png');
        const link = document.createElement('a');
        link.href = pngUrl;
        link.download = `${badgeId}.png`;
        link.click();
        URL.revokeObjectURL(url);
    };

    img.src = url;
}
</script>
</body>
</html>
